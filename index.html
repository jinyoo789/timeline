const STATUS_C = { backlog:"#6b7280", dev:"#3b82f6", qa:"#f59e0b", review:"#a855f7", done:"#22c55e" };

const addD=(s,n)=>{const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const diffD=(a,b)=>{const da=new Date(a+"T00:00:00"),db=new Date(b+"T00:00:00");return Math.round((db-da)/864e5);};
const fmtD=d=>{if(!d)return"";const t=new Date(d+"T00:00:00");return`${t.getMonth()+1}/${t.getDate()}`;};
const uid=()=>Math.random().toString(36).substr(2,8);
const DOW=["일","월","화","수","목","금","토"];
const TODAY=(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;})();

function Modal({open,onClose,title,children}){
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(e.key==="Escape")onClose();};
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[open,onClose]);
  if(!open)return null;
  const preventDrag=e=>{e.preventDefault();e.stopPropagation();};
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose} onDragOver={preventDrag} onDrop={preventDrag}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.3)",backdropFilter:"blur(6px)"}}/>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",background:"#ffffff",borderRadius:"20px 20px 0 0",padding:"20px 20px 28px",width:"100%",maxWidth:540,maxHeight:"90vh",overflow:"auto",boxShadow:"0 -8px 48px rgba(0,0,0,.12)"}}>
        <div style={{width:36,height:4,background:"#e2e5ea",borderRadius:2,margin:"0 auto 14px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0,fontSize:17,fontWeight:700,color:"#1a1a2e"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#6b7280",padding:"4px 8px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const I_STYLE={width:"100%",padding:"9px 12px",border:"1px solid #e2e5ea",borderRadius:10,fontSize:14,background:"#f1f3f5",color:"#1a1a2e",boxSizing:"border-box"};
const L_STYLE={fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:4,display:"block",letterSpacing:".04em"};

function TaskForm({task,projects,developers,onSave,onCancel,onDelete}){
  const isEdit=!!task;
  const empty={id:uid(),project_id:projects[0]?.id||"",title:"",type:"feature",status:"backlog",urgency:"medium",hasQa:true,
    subtasks:[{id:uid(),role:"BE",dev_id:"",start:TODAY,end:addD(TODAY,7),status:"backlog"},{id:uid(),role:"FE",dev_id:"",start:addD(TODAY,3),end:addD(TODAY,10),status:"backlog"}],
    qa_start:addD(TODAY,11),qa_end:addD(TODAY,13),deploys:[]};
  const[f,setF]=useState(task||empty);
  const[confirmDel,setConfirmDel]=useState(false);
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const setSub=(i,k,v)=>setF(o=>({...o,subtasks:o.subtasks.map((s,j)=>j===i?{...s,[k]:v}:s)}));
  const addSub=()=>setF(o=>({...o,subtasks:[...o.subtasks,{id:uid(),role:"BE",dev_id:"",start:o.subtasks.at(-1)?.end||TODAY,end:addD(o.subtasks.at(-1)?.end||TODAY,5),status:"backlog"}]}));
  const rmSub=i=>setF(o=>({...o,subtasks:o.subtasks.filter((_,j)=>j!==i)}));
  const setDep=(i,k,v)=>setF(o=>({...o,deploys:o.deploys.map((d,j)=>j===i?{...d,[k]:v}:d)}));
  const addDep=()=>setF(o=>({...o,deploys:[...o.deploys,{id:uid(),env:"STG",date:TODAY,status:"scheduled",note:""}]}));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label style={L_STYLE}>프로젝트</label><select value={f.project_id} onChange={e=>set("project_id",e.target.value)} style={I_STYLE}>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      <div><label style={L_STYLE}>태스크명</label><input value={f.title} onChange={e=>set("title",e.target.value)} style={I_STYLE} placeholder="태스크 제목"/></div>
      <div style={{borderTop:"1px solid #e8eaed",paddingTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{...L_STYLE,margin:0,fontSize:12}}>개발 파트</span>
          <button onClick={addSub} style={{background:"rgba(99,102,241,.1)",color:"#6366f1",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ 파트</button>
        </div>
        {f.subtasks.map((s,i)=>(
          <div key={s.id} style={{background:s.done?"#f0fdf4":"#f5f6f8",borderRadius:12,padding:12,marginBottom:6,position:"relative",border:s.done?"1px solid rgba(34,197,94,.2)":"1px solid transparent"}}>
            <div style={{position:"absolute",top:8,right:8,display:"flex",gap:6,alignItems:"center"}}>
              <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:11,color:s.done?"#22c55e":"#9ca3af"}}>
                <input type="checkbox" checked={!!s.done} onChange={e=>setSub(i,"done",e.target.checked)} style={{margin:0}}/>완료
              </label>
              {f.subtasks.length>1&&<button onClick={()=>rmSub(i)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:15,padding:0}}>×</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={L_STYLE}>역할</label><select value={s.role} onChange={e=>setSub(i,"role",e.target.value)} style={I_STYLE}>{ROLES.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
              <div><label style={L_STYLE}>담당자</label><select value={s.dev_id} onChange={e=>setSub(i,"dev_id",e.target.value)} style={I_STYLE}><option value="">미배정</option>{developers.filter(d=>d.role!=="PM").map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div><label style={L_STYLE}>시작</label><input type="date" value={s.start} onChange={e=>setSub(i,"start",e.target.value)} style={I_STYLE}/></div>
              <div><label style={L_STYLE}>종료</label><input type="date" value={s.end} onChange={e=>setSub(i,"end",e.target.value)} style={I_STYLE}/></div>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#1a1a2e"}}>
          <div onClick={()=>set("hasQa",!f.hasQa)} style={{width:38,height:22,borderRadius:11,background:f.hasQa?"#6366f1":"#e2e5ea",cursor:"pointer",position:"relative",transition:"background .2s"}}>
            <div style={{width:16,height:16,borderRadius:8,background:"#fff",position:"absolute",top:3,left:f.hasQa?19:3,transition:"left .2s"}}/>
          </div>QA 기간
        </label>
      </div>
      {f.hasQa&&<div style={{background:f.qaDone?"#f0fdf4":"#f5f6f8",borderRadius:12,padding:12,border:f.qaDone?"1px solid rgba(34,197,94,.2)":"1px solid transparent"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{...L_STYLE,margin:0}}>QA 일정</span>
          <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:11,color:f.qaDone?"#22c55e":"#9ca3af"}}>
            <input type="checkbox" checked={!!f.qaDone} onChange={e=>set("qaDone",e.target.checked)} style={{margin:0}}/>완료
          </label>
        </div>
        <div><label style={L_STYLE}>QA 담당</label><select value={f.qa_dev_id||""} onChange={e=>set("qa_dev_id",e.target.value)} style={I_STYLE}><option value="">미배정</option>{developers.filter(d=>d.role!=="PM").map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label style={L_STYLE}>QA 시작</label><input type="date" value={f.qa_start} onChange={e=>set("qa_start",e.target.value)} style={I_STYLE}/></div>
          <div><label style={L_STYLE}>QA 종료</label><input type="date" value={f.qa_end} onChange={e=>set("qa_end",e.target.value)} style={I_STYLE}/></div>
        </div>
      </div>}
      <div style={{borderTop:"1px solid #e8eaed",paddingTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{...L_STYLE,margin:0,fontSize:12}}>배포 일정 (태스크)</span>
          <button onClick={addDep} style={{background:"rgba(34,197,94,.12)",color:"#22c55e",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ 배포</button>
        </div>
        {f.deploys.map((d,i)=>(
          <div key={d.id} style={{background:"#f5f6f8",borderRadius:10,padding:10,marginBottom:6,display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:"0 0 70px"}}><label style={L_STYLE}>환경</label><select value={d.env} onChange={e=>setDep(i,"env",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}><option value="STG">STG</option><option value="PRD">PRD</option></select></div>
            <div style={{flex:"0 0 130px"}}><label style={L_STYLE}>날짜</label><input type="date" value={d.date} onChange={e=>setDep(i,"date",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}/></div>
            <div style={{flex:"0 0 80px"}}><label style={L_STYLE}>상태</label><select value={d.status} onChange={e=>setDep(i,"status",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}><option value="scheduled">예정</option><option value="deployed">완료</option><option value="rollback">롤백</option></select></div>
            <div style={{flex:1,minWidth:60}}><label style={L_STYLE}>메모</label><input value={d.note} onChange={e=>setDep(i,"note",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}} placeholder="메모"/></div>
            <button onClick={()=>rmDep(i)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:16,padding:"6px"}}>×</button>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"space-between",alignItems:"center"}}>
        <div>{isEdit&&!confirmDel&&<button onClick={()=>setConfirmDel(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,.25)",background:"rgba(239,68,68,.08)",color:"#ef4444",cursor:"pointer",fontSize:13}}>삭제</button>}
          {isEdit&&confirmDel&&<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#ef4444"}}>정말 삭제?</span>
            <button onClick={()=>onDelete(f.id)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>확인</button>
            <button onClick={()=>setConfirmDel(false)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:12}}>취소</button></div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onCancel} style={{padding:"10px 20px",borderRadius:10,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>취소</button>
          <button onClick={()=>f.title&&onSave(f)} style={{padding:"10px 24px",borderRadius:10,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>저장</button>
        </div>
      </div>
    </div>
  );
}

function ProjectForm({project,onSave,onCancel,onDelete,taskCount=0,developers=[]}){
  const isEdit=!!project;
  const[f,setF]=useState(project||{id:uid(),name:"",priority:"P1",pm:"",deploys:[]});
  const[confirmDel,setConfirmDel]=useState(false);
  const pms=developers.filter(d=>d.role==="PM");
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const setDep=(i,k,v)=>setF(o=>({...o,deploys:o.deploys.map((d,j)=>j===i?{...d,[k]:v}:d)}));
  const addDep=()=>setF(o=>({...o,deploys:[...o.deploys,{id:uid(),env:"STG",date:TODAY,status:"scheduled",note:""}]}));
  const rmDep=i=>setF(o=>({...o,deploys:o.deploys.filter((_,j)=>j!==i)}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label style={L_STYLE}>프로젝트명</label><input value={f.name} onChange={e=>set("name",e.target.value)} style={I_STYLE} placeholder="프로젝트 이름"/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style={L_STYLE}>우선순위</label><select value={f.priority} onChange={e=>set("priority",e.target.value)} style={I_STYLE}><option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option></select></div>
        <div><label style={L_STYLE}>담당 PM</label><select value={f.pm||""} onChange={e=>set("pm",e.target.value)} style={I_STYLE}><option value="">미지정</option>{pms.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      </div>
      <div style={{borderTop:"1px solid #e8eaed",paddingTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{...L_STYLE,margin:0,fontSize:12}}>프로젝트 배포 일정</span>
          <button onClick={addDep} style={{background:"rgba(34,197,94,.12)",color:"#22c55e",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ 배포</button>
        </div>
        <p style={{fontSize:11,color:"#9ca3af",margin:"0 0 8px"}}>프로젝트 단위 배포일을 등록하면 타임라인 상단에 표시됩니다</p>
        {f.deploys.map((d,i)=>(
          <div key={d.id} style={{background:"#f5f6f8",borderRadius:10,padding:10,marginBottom:6,display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:"0 0 70px"}}><label style={L_STYLE}>환경</label><select value={d.env} onChange={e=>setDep(i,"env",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}><option value="STG">STG</option><option value="PRD">PRD</option></select></div>
            <div style={{flex:"0 0 130px"}}><label style={L_STYLE}>날짜</label><input type="date" value={d.date} onChange={e=>setDep(i,"date",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}/></div>
            <div style={{flex:"0 0 80px"}}><label style={L_STYLE}>상태</label><select value={d.status} onChange={e=>setDep(i,"status",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}}><option value="scheduled">예정</option><option value="deployed">완료</option><option value="rollback">롤백</option></select></div>
            <div style={{flex:1,minWidth:60}}><label style={L_STYLE}>메모</label><input value={d.note} onChange={e=>setDep(i,"note",e.target.value)} style={{...I_STYLE,padding:"7px 8px"}} placeholder="메모"/></div>
            <button onClick={()=>rmDep(i)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:16,padding:"6px"}}>×</button>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"space-between",alignItems:"center"}}>
        <div>{isEdit&&!confirmDel&&<button onClick={()=>setConfirmDel(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,.25)",background:"rgba(239,68,68,.08)",color:"#ef4444",cursor:"pointer",fontSize:13}}>삭제</button>}
          {isEdit&&confirmDel&&<div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:12,color:"#ef4444"}}>{taskCount>0?`소속 태스크 ${taskCount}건도 삭제됩니다. 계속?`:"삭제할까요?"}</span>
            <button onClick={()=>onDelete(f.id)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>확인</button>

        </div>
      </div>
    </div>

function CrmForm({crm,onSave,onCancel,onDelete,developers=[]}){
  const isEdit=!!crm;
  const[f,setF]=useState(crm||{id:uid(),date:TODAY,name:"",channel:"push",expected_count:0,conversion_rate:0,pm:"",note:"",type:"crm"});
  const[cdel,setCdel]=useState(false);
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const pms=developers.filter(d=>d.role==="PM");
  const isEtc=f.type==="etc";
  const isTodo=f.type==="todo";
  const handleImgFile=file=>{if(!file||!file.type.startsWith("image/"))return;const reader=new FileReader();reader.onload=ev=>set("image",ev.target.result);reader.readAsDataURL(file);};
  useEffect(()=>{const onPaste=e=>{const items=e.clipboardData?.items;if(!items)return;for(const item of items){if(item.type.startsWith("image/")){e.preventDefault();handleImgFile(item.getAsFile());return;}}};window.addEventListener("paste",onPaste);return()=>window.removeEventListener("paste",onPaste);},[]);
  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",background:"#f1f3f5",borderRadius:8,padding:2,marginBottom:4}}>
      {[["crm","CRM 발송"],["etc","기타 일정"],["todo","할일"]].map(([v,l])=>(
        <button key={v} onClick={()=>set("type",v)} style={{flex:1,padding:"6px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:f.type===v?"#6366f1":"transparent",color:f.type===v?"#fff":"#6b7280"}}>{l}</button>
      ))}

      <div><label style={L_STYLE}>담당 PM</label><select value={f.pm||""} onChange={e=>set("pm",e.target.value)} style={I_STYLE}><option value="">미지정</option>{pms.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>

        <button onClick={()=>set("image",null)} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:12,border:"none",background:"rgba(0,0,0,.5)",color:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>

        {isEdit&&cdel&&<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#ef4444"}}>삭제할까요?</span>

      </div>

        <button onClick={onCancel} style={{padding:"10px 20px",borderRadius:10,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>취소</button>

            <button onClick={()=>setDelConfirm(false)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:12}}>취소</button>

function App(){
  const[isEditor,setIsEditor]=useState(false);
  const[pwModal,setPwModal]=useState(false);
  const[pwInput,setPwInput]=useState("");
  const[pwError,setPwError]=useState(false);
  const[devs,setDevs]=useState(S_DEVS);
  const[projs,setProjs]=useState(S_PROJ);
  const[tasks,setTasks]=useState(S_TASKS);
  const[crms,setCrms]=useState(S_CRM);
  const[view,setView]=useState("overview");
  const[fDev,setFDev]=useState("all");
  const[modal,setModal]=useState(null);
  const[editTask,setEditTask]=useState(null);
  const[editProj,setEditProj]=useState(null);
  const[editCrm,setEditCrm]=useState(null);
  const[editDev,setEditDev]=useState(null);
  const[imgPreview,setImgPreview]=useState(null);
  const[copyTextContent,setCopyTextContent]=useState("");
  const[fPm,setFPm]=useState("all");
  const[hover,setHover]=useState(null);
  const[hPos,setHPos]=useState({x:0,y:0});
  const[deployTip,setDeployTip]=useState(null);
  const[deployTipPos,setDeployTipPos]=useState({x:0,y:0});
  const[ovTip,setOvTip]=useState(null);
  const[ovTipPos,setOvTipPos]=useState({x:0,y:0});
  const[legendOpen,setLegendOpen]=useState(false);
  const[pastLimit,setPastLimit]=useState(10);
  const[hideDone,setHideDone]=useState(false);
  const[dashFilter,setDashFilter]=useState({prd:true,stg:true,crm:true,etc:true});
  const[addMenuOpen,setAddMenuOpen]=useState(false);
  const[sideOpen,setSideOpen]=useState(window.innerWidth>640);
  const[logs,setLogs]=useState([]);
  const scrollRef=useRef(null);
  const leftRef=useRef(null);
  const syncing=useRef(false);
  const syncScroll=(source)=>{
    if(syncing.current)return;
    syncing.current=true;
    const other=source==="left"?scrollRef.current:leftRef.current;
    const src=source==="left"?leftRef.current:scrollRef.current;
    if(other&&src)other.scrollTop=src.scrollTop;
    requestAnimationFrame(()=>{syncing.current=false;});
  };

  useEffect(()=>{
    const dbRef=window.fbRef(window.fbDb,"gantt-shared");
    window.fbOnValue(dbRef,(snap)=>{
      const d=snap.val();
      if(d){
        if(d.tasks)setTasks(d.tasks);if(d.devs)setDevs(d.devs);if(d.projs)setProjs(d.projs);if(d.crms)setCrms(d.crms);if(d.logs)setLogs(d.logs);
        if(d.workload)setManualLoad(d.workload);
      }
    });
  },[]);
  const save=useCallback((t,dv,pr,cr,lg)=>{
    try{window.fbSet(window.fbRef(window.fbDb,"gantt-shared"),{tasks:t,devs:dv,projs:pr,crms:cr||[],logs:lg||[],workload:manualLoad});}catch(e){}
  },[manualLoad]);
  const addLog=useCallback((action,target)=>{
    const entry={id:uid(),action,target,time:new Date().toISOString()};
    setLogs(prev=>{const nl=[entry,...prev].slice(0,500);return nl;});
    return entry;
  },[]);
  useEffect(()=>{const h=()=>setSideOpen(window.innerWidth>640);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  // collect all deploys (task + project level)
  const allDeploys=useMemo(()=>{
    const td=tasks.flatMap(t=>(t.deploys||[]).map(d=>({...d,source:t.title,level:"task"})));
    const pd=projs.flatMap(p=>(p.deploys||[]).map(d=>({...d,source:p.name,level:"project"})));
    return[...td,...pd];
  },[tasks,projs]);

  const allDates=useMemo(()=>{
    const d=[TODAY];
    tasks.forEach(t=>{t.subtasks.forEach(s=>{d.push(s.start,s.end);});if(t.hasQa)d.push(t.qa_start,t.qa_end);(t.deploys||[]).forEach(x=>d.push(x.date));});
    projs.forEach(p=>(p.deploys||[]).forEach(x=>d.push(x.date)));
    crms.forEach(x=>d.push(x.date));
    return d.filter(Boolean).sort();
  },[tasks,projs,crms]);
  const rStart=useMemo(()=>{const earliest=allDates[0]||TODAY;const minStart=addD(TODAY,-28);return earliest<minStart?addD(earliest,-2):minStart;},[allDates]);
  const rEnd=useMemo(()=>{const latest=allDates.at(-1)||TODAY;const minEnd=addD(TODAY,42);return latest>minEnd?addD(latest,4):minEnd;},[allDates]);
  const totalD=diffD(rStart,rEnd)+1;
  const DW=40;const DW_WE=16; // weekday 40px, weekend 16px

  // precompute day layout: x positions and widths for each day
  const dayLayout=useMemo(()=>{
    const arr=[];let x=0;
    for(let i=0;i<totalD;i++){
      const ds=addD(rStart,i);const dt=new Date(ds+"T00:00:00");
      const isWe=dt.getDay()===0||dt.getDay()===6;
      const w=isWe?DW_WE:DW;
      arr.push({x,w,date:ds,dow:dt.getDay(),isWe,isToday:ds===TODAY,label:dt.getDate()});
      x+=w;
    }
    return arr;
  },[totalD,rStart]);
  const totalW=dayLayout.length?dayLayout.at(-1).x+dayLayout.at(-1).w:0;

  // helper: get x position for a date string
  const dateX=useCallback((ds)=>{
    const idx=diffD(rStart,ds);
    if(idx<0)return 0;
    if(idx>=dayLayout.length)return totalW;
    return dayLayout[idx].x;
  },[dayLayout,rStart,totalW]);
  // helper: get center x for a date
  const dateCX=useCallback((ds)=>{
    const idx=diffD(rStart,ds);
    if(idx<0)return 0;
    if(idx>=dayLayout.length)return totalW;
    const d=dayLayout[idx];return d.x+d.w/2;
  },[dayLayout,rStart,totalW]);

  // Manual workload: devId -> { "2026-03-20": 0|1|2|3 }
  // 0=여유(default), 1=보통, 2=바쁨, 3=불가
  const[manualLoad,setManualLoad]=useState({});
  const saveLoad=useCallback((ml)=>{try{window.fbSet(window.fbRef(window.fbDb,"gantt-shared/workload"),ml);}catch(e){}},[]);
  const cycleLoad=(devId,date)=>{
    setManualLoad(prev=>{
      const devMap={...(prev[devId]||{})};
      const cur=devMap[date]||0;
      const next=(cur+1)%4;
      if(next===0)delete devMap[date];else devMap[date]=next;
      const nl={...prev,[devId]:devMap};
      saveLoad(nl);
      return nl;
    });
  };
  const LOAD_LABELS=["","보통","바쁨","불가"];
  const LOAD_COLORS=["transparent","rgba(99,102,241,.12)","rgba(245,158,11,.25)","rgba(239,68,68,.3)"];
  const LOAD_TEXT_COLORS=["","#6366f1","#d97706","#ef4444"];

  const fTasks=useMemo(()=>tasks.filter(t=>{
    if(fDev!=="all"&&!t.subtasks.some(s=>s.dev_id===fDev))return false;
    return true;
  }),[tasks,fDev]);

  const groups=useMemo(()=>{
    if(view==="project"){
      const filteredProjs=fPm==="all"?projs:projs.filter(p=>p.pm===fPm);
      const all=filteredProjs.map(p=>{
        const items=fTasks.filter(t=>t.project_id===p.id).map(t=>({...t,_showSubs:t.subtasks}));
        const allDone=items.length>0&&items.every(t=>t.status==="done");
        return{key:p.id,label:p.name,priority:p.priority,type:"project",projId:p.id,pm:p.pm,items,allDone};
      }).filter(g=>g.items.length);
      if(hideDone)return all.filter(g=>!g.allDone);
      // sort: active first, done last
      return[...all.filter(g=>!g.allDone),...all.filter(g=>g.allDone)];
    }
    const targetDevs=(fDev==="all"?devs:devs.filter(d=>d.id===fDev)).filter(d=>d.role!=="PM");
    const todos=crms.filter(c=>c.type==="todo");
    const gs=targetDevs.map(d=>{
      let devTasks=fTasks.filter(t=>t.subtasks.some(s=>s.dev_id===d.id));
      if(hideDone)devTasks=devTasks.filter(t=>t.status!=="done");
      let devTodos=todos.filter(td=>td.dev_id===d.id);
      if(hideDone)devTodos=devTodos.filter(td=>!td.completed);
      return{key:d.id,label:d.name,sublabel:d.role,type:"developer",devId:d.id,
        items:devTasks.map(t=>({...t,_showSubs:t.subtasks.filter(s=>s.dev_id===d.id)})),
        todos:devTodos};
    });
    if(fDev==="all"){
      let un=fTasks.filter(t=>t.subtasks.every(s=>!s.dev_id));
      if(hideDone)un=un.filter(t=>t.status!=="done");
      let unTodos=todos.filter(td=>!td.dev_id);
      if(hideDone)unTodos=unTodos.filter(td=>!td.completed);
      if(un.length||unTodos.length)gs.push({key:"none",label:"미배정",sublabel:"",type:"developer",devId:null,items:un.map(t=>({...t,_showSubs:t.subtasks})),todos:unTodos});
    }
    return gs.filter(g=>g.items.length||(g.todos&&g.todos.length));
  },[view,projs,devs,fTasks,crms,fDev,fPm,hideDone]);

  const headers=useMemo(()=>{
    const months={};
    dayLayout.forEach((d,i)=>{
      const dt=new Date(d.date+"T00:00:00");
      const mk=`${dt.getFullYear()}-${dt.getMonth()}`;
      if(!months[mk])months[mk]={startX:d.x,width:0,label:`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}`};
      months[mk].width+=d.w;
    });
    return{days:dayLayout,months:Object.values(months)};
  },[dayLayout]);

  const todayX=dateCX(TODAY);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollLeft=Math.max(todayX-10,0);},[todayX,view]);

  const barL=s=>dateX(s);
  const barW=(s,e)=>{const l=dateX(s);const idx2=diffD(rStart,e);const d2=dayLayout[Math.min(idx2,dayLayout.length-1)];return Math.max(d2?d2.x+d2.w-l-2:6,6);};

  const handleSaveTask=t=>{
    // Auto-complete: all subtasks done + (no QA or QA done)
    const allSubsDone=t.subtasks.length>0&&t.subtasks.every(s=>s.done);
    const qaOk=!t.hasQa||!!t.qaDone;
    const allDone=allSubsDone&&qaOk;
    if(allDone&&t.status!=="done")t={...t,status:"done"};
    if(!allDone&&t.status==="done")t={...t,status:"dev"};
    const isEdit=tasks.some(x=>x.id===t.id);const nt=isEdit?tasks.map(x=>x.id===t.id?t:x):[...tasks,t];setTasks(nt);const lg=addLog(isEdit?"수정":"추가",`태스크: ${t.title}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(nt,devs,projs,crms,nl);setModal(null);setEditTask(null);
  };
  const handleDelTask=id=>{const t=tasks.find(x=>x.id===id);const nt=tasks.filter(x=>x.id!==id);setTasks(nt);const lg=addLog("삭제",`태스크: ${t?.title||id}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(nt,devs,projs,crms,nl);setModal(null);setEditTask(null);};
  const handleSaveProj=p=>{const isEdit=projs.some(x=>x.id===p.id);const np=isEdit?projs.map(x=>x.id===p.id?p:x):[...projs,p];setProjs(np);const lg=addLog(isEdit?"수정":"추가",`프로젝트: ${p.name}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(tasks,devs,np,crms,nl);setModal(null);setEditProj(null);};
  const handleDelProj=id=>{const p=projs.find(x=>x.id===id);const np=projs.filter(x=>x.id!==id);const nt=tasks.filter(t=>t.project_id!==id);setProjs(np);setTasks(nt);const lg=addLog("삭제",`프로젝트: ${p?.name||id}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(nt,devs,np,crms,nl);setModal(null);setEditProj(null);};
  const handleSaveCrm=c=>{const isEdit=crms.some(x=>x.id===c.id);const nc=isEdit?crms.map(x=>x.id===c.id?c:x):[...crms,c];setCrms(nc);const lg=addLog(isEdit?"수정":"추가",`${c.type==="todo"?"할일":c.type==="etc"?"기타":"CRM"}: ${c.name}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(tasks,devs,projs,nc,nl);setModal(null);setEditCrm(null);};
  const handleDelCrm=id=>{const c=crms.find(x=>x.id===id);const nc=crms.filter(x=>x.id!==id);setCrms(nc);const lg=addLog("삭제",`${c?.type==="todo"?"할일":c?.type==="etc"?"기타":"CRM"}: ${c?.name||id}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(tasks,devs,projs,nc,nl);setModal(null);setEditCrm(null);};

  // Quick status cycle
  const STATUS_ORDER=["backlog","dev","qa","review","done"];
  const cycleStatus=(taskId,e)=>{
    e.stopPropagation();
    const task=tasks.find(t=>t.id===taskId);
    const nt=tasks.map(t=>{if(t.id!==taskId)return t;const idx=STATUS_ORDER.indexOf(t.status);const next=STATUS_ORDER[(idx+1)%STATUS_ORDER.length];return{...t,status:next};});
    setTasks(nt);const newStatus=STATUS_ORDER[(STATUS_ORDER.indexOf(task?.status||"backlog")+1)%STATUS_ORDER.length];
    const lg=addLog("상태변경",`${task?.title}: ${STATUS_L[newStatus]}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(nt,devs,projs,crms,nl);
  };

  // Developer management
  const handleSaveDev=d=>{const isEdit=devs.some(x=>x.id===d.id);const nd=isEdit?devs.map(x=>x.id===d.id?d:x):[...devs,d];setDevs(nd);const lg=addLog(isEdit?"수정":"추가",`인원: ${d.name} (${d.role})`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(tasks,nd,projs,crms,nl);setEditDev(null);};
  const handleDelDev=id=>{const d=devs.find(x=>x.id===id);const nd=devs.filter(x=>x.id!==id);setDevs(nd);const lg=addLog("삭제",`인원: ${d?.name||id}`);const nl=[lg,...logs].slice(0,500);setLogs(nl);save(tasks,nd,projs,crms,nl);setEditDev(null);};

  const getRowH=t=>{const subs=(t._showSubs||t.subtasks).length;const hasQ=t.hasQa&&t.qa_start;return 10+Math.max(subs,1)*22+(hasQ?22:0)+8;};
  const HEATMAP_H=20;
  const LW=sideOpen?200:90;

  return(
    <div style={{fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:"#ffffff",color:"#1a1a2e",minHeight:"100vh",overflow:"hidden"}} onClick={()=>{setDeployTip(null);setAddMenuOpen(false);}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');*{box-sizing:border-box}::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-track{background:#f1f3f5}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}.hide-scroll::-webkit-scrollbar{display:none}.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}`}</style>

      {/* top - row 1: title + tabs (always visible) */}
      <div style={{padding:"10px 14px 0",display:"flex",alignItems:"center",gap:8}}>
        <h1 style={{margin:0,fontSize:16,fontWeight:700,whiteSpace:"nowrap"}}><span style={{color:"#6366f1"}}>DEV</span> Timeline</h1>
        <div style={{display:"flex",background:"#f1f3f5",borderRadius:8,padding:2}}>
          {[["overview","대시보드"],["project","프로젝트"],["developer","개발자"],["settings","설정"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);setFDev("all");setFPm("all");}} style={{padding:"5px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:view===v?"#6366f1":"transparent",color:view===v?"#fff":"#6b7280"}}>{l}</button>
          ))}
        </div>
      </div>
      {/* top - row 2: context actions */}
      <div style={{padding:"6px 14px 8px",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid #e8eaed",minHeight:36}}>
        {view==="developer"&&<select value={fDev} onChange={e=>setFDev(e.target.value)} style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e2e5ea",background:"#f1f3f5",color:"#1a1a2e",fontSize:12,minWidth:80}}>
          <option value="all">전체</option>{devs.filter(d=>d.role!=="PM").map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
        </select>}
        {view==="project"&&(()=>{
          const pmIds=[...new Set(projs.map(p=>p.pm).filter(Boolean))];
          return pmIds.length>0?<select value={fPm} onChange={e=>setFPm(e.target.value)} style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e2e5ea",background:"#f1f3f5",color:"#1a1a2e",fontSize:12,minWidth:80}}>
            <option value="all">전체</option>{pmIds.map(id=><option key={id} value={id}>{devs.find(d=>d.id===id)?.name||id}</option>)}
          </select>:null;
        })()}
        {(view==="project"||view==="developer")&&<>
          <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#6b7280",cursor:"pointer"}}>
            <input type="checkbox" checked={hideDone} onChange={e=>setHideDone(e.target.checked)} style={{margin:0}}/>완료 숨김
          </label>
          <div style={{marginLeft:"auto",position:"relative"}}>
            <button onClick={e=>{e.stopPropagation();if(!isEditor){setPwModal(true);return;}setAddMenuOpen(o=>!o);}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>+ 등록</button>
            {addMenuOpen&&isEditor&&<div style={{position:"absolute",top:"100%",right:0,marginTop:4,background:"#fff",border:"1px solid #e2e5ea",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.1)",overflow:"hidden",zIndex:20,minWidth:120}}>
              <button onClick={()=>{setEditProj(null);setModal("project");setAddMenuOpen(false);}} style={{display:"block",width:"100%",padding:"10px 16px",border:"none",background:"none",textAlign:"left",fontSize:12,fontWeight:600,color:"#1a1a2e",cursor:"pointer"}}>프로젝트</button>
              <button onClick={()=>{setEditTask(null);setModal("task");setAddMenuOpen(false);}} style={{display:"block",width:"100%",padding:"10px 16px",border:"none",background:"none",textAlign:"left",fontSize:12,fontWeight:600,color:"#1a1a2e",cursor:"pointer",borderTop:"1px solid #f1f3f5"}}>태스크</button>
              <button onClick={()=>{setEditCrm(null);setModal("crm");setAddMenuOpen(false);}} style={{display:"block",width:"100%",padding:"10px 16px",border:"none",background:"none",textAlign:"left",fontSize:12,fontWeight:600,color:"#a855f7",cursor:"pointer",borderTop:"1px solid #f1f3f5"}}>일정 / CRM</button>
              <button onClick={()=>{setEditCrm({id:uid(),date:TODAY,name:"",type:"todo",dev_id:"",note:""});setModal("crm");setAddMenuOpen(false);}} style={{display:"block",width:"100%",padding:"10px 16px",border:"none",background:"none",textAlign:"left",fontSize:12,fontWeight:600,color:"#f59e0b",cursor:"pointer",borderTop:"1px solid #f1f3f5"}}>할일</button>
            </div>}
          </div>
        </>}
      </div>

      {view==="overview"?(()=>{
        // PM name helper
        const pmName=id=>devs.find(d=>d.id===id)?.name||"";
        // Collect all events sorted by date
        const events=[];
        allDeploys.forEach(d=>{
          const proj=projs.find(p=>(p.deploys||[]).some(pd=>pd.id===d.id));
          const taskMatch=tasks.find(t=>(t.deploys||[]).some(td=>td.id===d.id));
          const taskProj=taskMatch?projs.find(p=>p.id===taskMatch.project_id):null;
          const pmId=proj?.pm||taskProj?.pm||"";
          events.push({type:d.env==="PRD"?"prd":"stg",date:d.date,title:d.source,status:d.status,note:d.note,level:d.level,pm:pmId,pmName:pmName(pmId)});
        });
        crms.forEach(c=>{
          const t=c.type||"crm";
          if(t==="todo")return; // todos are shown in separate checklist
          events.push({type:t==="etc"?"etc":"crm",date:c.date,title:c.name,channel:c.channel,expected_count:c.expected_count,conversion_rate:c.conversion_rate,pm:c.pm||"",pmName:pmName(c.pm),completed:!!c.completed,image:c.image||null,crmId:c.id});
        });
        events.sort((a,b)=>a.date.localeCompare(b.date));

        const allPms=[...new Set(events.map(e=>e.pm).filter(Boolean))];
        const filtered=fPm==="all"?events:events.filter(e=>e.pm===fPm);
        const upcoming=filtered.filter(e=>e.date>=TODAY);
        const past=filtered.filter(e=>e.date<TODAY).reverse();
        const typeStyle={prd:{bg:"rgba(34,197,94,.1)",color:"#16a34a",label:"PRD 배포"},stg:{bg:"rgba(245,158,11,.1)",color:"#d97706",label:"STG 배포"},crm:{bg:"rgba(168,85,247,.1)",color:"#9333ea",label:"CRM 발송"},etc:{bg:"rgba(107,114,128,.1)",color:"#4b5563",label:"기타"}};

        const buildText=()=>{
          const lines=["📋 배포/CRM/기타 일정 현황",`기준일: ${TODAY}`,""];
          const fmt=e=>{const s=typeStyle[e.type];const d=new Date(e.date+"T00:00:00");return`${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]}) [${s.label}] ${e.title}${e.pmName?` (${e.pmName})`:""}${e.note?` — ${e.note}`:""}${e.type==="crm"&&e.expected_count?` (모수 ${e.expected_count.toLocaleString()}, 유입률 ${e.conversion_rate}%)`:""}`;};
          if(upcoming.length){lines.push("▶ 예정");upcoming.forEach(e=>lines.push("  "+fmt(e)));lines.push("");}
          if(past.length){lines.push("✓ 완료");past.slice(0,10).forEach(e=>lines.push("  "+fmt(e)));}
          return lines.join("\n");
        };
        const handleCopy=()=>{
          const text=buildText();
          setCopyTextContent(text);
          if(navigator.clipboard&&navigator.clipboard.writeText){
            navigator.clipboard.writeText(text).then(()=>setModal("copied")).catch(()=>setModal("copytext"));
          }else{setModal("copytext");}
        };
        // overview dot tooltip
        

        return(
          <div style={{height:"calc(100vh - 56px)",overflow:"auto",padding:"0 0 40px"}}>
            {/* Timeline strip: 3 rows */}
            <div style={{padding:"20px 20px 0",marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:10,flexWrap:"wrap"}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700,color:"#1a1a2e"}}>배포 · CRM 타임라인</h2>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {allPms.length>0&&<select value={fPm} onChange={e=>setFPm(e.target.value)} style={{padding:"5px 10px",borderRadius:8,border:"1px solid #e2e5ea",background:"#f8f9fb",color:"#1a1a2e",fontSize:12}}>
                    <option value="all">전체 PM</option>{allPms.map(p=><option key={p} value={p}>{pmName(p)||p}</option>)}
                  </select>}
                  {isEditor&&<button onClick={handleCopy} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e5ea",background:"#fff",color:"#6b7280",cursor:"pointer",fontSize:12,fontWeight:600}}>
                    📋 복사
                  </button>}
                </div>
              </div>
              <div ref={el=>{if(el){
                // scroll to today
                const cols=el.querySelectorAll("[data-today]");
                if(cols.length)cols[0].scrollIntoView({inline:"start",block:"nearest"});
              }}} style={{overflowX:"auto",borderRadius:12,border:"1px solid #e8eaed"}}>
                {(()=>{
                  // build grid: each column = 1 day, fixed widths
                  const rows=["stg","prd","crm","etc"];
                  const rowLabels={stg:"STG 배포",prd:"PRD 배포",crm:"CRM 발송",etc:"기타"};
                  const rowColors={stg:"#f59e0b",prd:"#22c55e",crm:"#a855f7",etc:"#6b7280"};
                  const colTemplate=dayLayout.map(d=>d.isWe?"16px":"40px").join(" ");
                  // map events to {type->{dateStr->event}}
                  const eventMap={};
                  rows.forEach(r=>eventMap[r]={});
                  filtered.forEach(e=>{if(eventMap[e.type])eventMap[e.type][e.date]=e;});

                  return(
                    <div style={{display:"inline-block",minWidth:"100%"}}>
                      {/* month header */}
                      <div style={{display:"flex",borderBottom:"1px solid #e8eaed",background:"#fafbfc"}}>
                        <div style={{width:80,flexShrink:0}}/>
                        <div style={{display:"grid",gridTemplateColumns:colTemplate}}>
                          {(()=>{
                            const cells=[];let curMonth="",startIdx=0;
                            dayLayout.forEach((d,i)=>{
                              const dt=new Date(d.date+"T00:00:00");
                              const mk=`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}`;
                              if(mk!==curMonth){
                                if(curMonth&&i>startIdx)cells.push({label:curMonth,span:i-startIdx,start:startIdx});
                                curMonth=mk;startIdx=i;
                              }
                              if(i===dayLayout.length-1)cells.push({label:mk,span:i-startIdx+1,start:startIdx});
                            });
                            return cells.map((c,ci)=>(
                              <div key={ci} style={{gridColumn:`${c.start+1} / span ${c.span}`,fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"center",padding:"4px 0",borderRight:"1px solid #e8eaed"}}>{c.label}</div>
                            ));
                          })()}
                        </div>
                      </div>
                      {/* date header */}
                      <div style={{display:"flex",borderBottom:"1px solid #e8eaed",background:"#fafbfc"}}>
                        <div style={{width:80,flexShrink:0}}/>
                        <div style={{display:"grid",gridTemplateColumns:colTemplate}}>
                          {dayLayout.map((d,i)=>(
                            <div key={i} data-today={d.isToday?"1":undefined} style={{textAlign:"center",padding:"4px 0",fontSize:d.isWe?8:10,fontFamily:"'JetBrains Mono',monospace",
                              color:d.isToday?"#6366f1":d.isWe?"#c7c9cf":"#9ca3af",fontWeight:d.isToday?700:400,
                              background:d.isToday?"rgba(99,102,241,.06)":d.isWe?"#f5f5f7":"transparent"}}>
                              {d.label}
                            </div>
                          ))}
                        </div>
                      </div>
                      {/* event rows */}
                      {rows.map(type=>{
                        const rowEvts=filtered.filter(e=>e.type===type);
                        if(rowEvts.length===0&&type==="etc")return null;
                        return(
                          <div key={type} style={{display:"flex",borderBottom:"1px solid #f1f3f5"}}>
                            <div style={{width:80,flexShrink:0,padding:"0 10px",fontSize:11,fontWeight:600,color:"#6b7280",display:"flex",alignItems:"center",height:32}}>{rowLabels[type]}</div>
                            <div style={{display:"grid",gridTemplateColumns:colTemplate,height:32}}>
                              {dayLayout.map((d,i)=>{
                                const ev=eventMap[type]?.[d.date];
                                return(
                                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"center",height:32,position:"relative",
                                    background:d.isWe?"#f5f5f7":"transparent"}}>
                                    {d.isToday&&<div style={{position:"absolute",left:"50%",top:0,width:2,height:32,background:"rgba(99,102,241,.12)",transform:"translateX(-1px)"}}/>}
                                    {ev&&<div style={{width:"calc(100% - 4px)",height:24,borderRadius:4,background:rowColors[type],opacity:ev.completed?.3:ev.status==="deployed"?.5:.85,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}
                                      onClick={e=>{e.stopPropagation();setOvTip(ovTip===ev?null:ev);setOvTipPos({x:e.clientX,y:e.clientY});}}>
                                      {!d.isWe&&<span style={{fontSize:8,fontWeight:700,color:"#fff",whiteSpace:"nowrap"}}>{new Date(ev.date+"T00:00:00").getDate()}</span>}
                                    </div>}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>
            </div>

            {/* Upcoming events list */}
            <div style={{padding:"20px 20px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700,color:"#1a1a2e"}}>다가오는 일정</h2>
                <div style={{display:"flex",gap:4}}>
                  {[["prd","PRD","#22c55e"],["stg","STG","#f59e0b"],["crm","CRM","#a855f7"],["etc","기타","#6b7280"]].map(([k,label,color])=>(
                    <button key={k} onClick={()=>setDashFilter(f=>({...f,[k]:!f[k]}))}
                      style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer",border:"1px solid",
                        background:dashFilter[k]?`${color}15`:"#fff",color:dashFilter[k]?color:"#d1d5db",borderColor:dashFilter[k]?`${color}40`:"#e8eaed"}}>{label}</button>
                  ))}
                </div>
              </div>
              {(()=>{const fUpcoming=upcoming.filter(e=>dashFilter[e.type]);return fUpcoming.length===0?<p style={{color:"#9ca3af",fontSize:13}}>예정된 일정이 없습니다</p>:fUpcoming.map((e,i)=>{
                const s=typeStyle[e.type];const dt=new Date(e.date+"T00:00:00");const daysLeft=diffD(TODAY,e.date);
                const isUrgent=daysLeft<=3&&daysLeft>=0;
                return(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",marginBottom:8,borderRadius:12,border:`1px solid ${e.completed?"rgba(34,197,94,.2)":isUrgent?"rgba(239,68,68,.2)":"#e8eaed"}`,background:e.completed?"rgba(34,197,94,.03)":isUrgent?"rgba(239,68,68,.03)":"#fff",opacity:e.completed?.5:1}}>
                    <div style={{textAlign:"center",minWidth:44,flexShrink:0}}>
                      <div style={{fontSize:20,fontWeight:700,color:e.completed?"#22c55e":"#1a1a2e",fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{dt.getDate()}</div>
                      <div style={{fontSize:10,color:"#9ca3af"}}>{dt.getMonth()+1}월 {DOW[dt.getDay()]}</div>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:700,background:s.bg,color:s.color}}>{s.label}</span>
                        {e.completed&&<span style={{fontSize:10,fontWeight:700,color:"#22c55e"}}>완료</span>}
                        {!e.completed&&isUrgent&&daysLeft>0&&<span style={{fontSize:10,fontWeight:700,color:"#ef4444"}}>D-{daysLeft}</span>}
                        {e.level&&<span style={{fontSize:10,color:"#9ca3af"}}>{e.level==="project"?"프로젝트":"태스크"}</span>}
                        {e.pmName&&<span style={{fontSize:10,fontWeight:600,color:"#6366f1",background:"rgba(99,102,241,.08)",padding:"1px 6px",borderRadius:4}}>{e.pmName}</span>}
                      </div>
                      <div style={{fontSize:14,fontWeight:600,color:"#1a1a2e",marginBottom:2}}>{e.title}{e.image&&<span style={{marginLeft:4,fontSize:11,verticalAlign:"middle"}}>📎</span>}</div>
                      {e.note&&<div style={{fontSize:12,color:"#6b7280"}}>{e.note}</div>}
                      {e.type==="crm"&&e.expected_count>0&&(
                        <div style={{fontSize:12,color:"#9333ea",marginTop:4}}>
                          모수 {e.expected_count.toLocaleString()}명 · 유입률 {e.conversion_rate}% · 예상 유입 <strong>{Math.round(e.expected_count*e.conversion_rate/100).toLocaleString()}명</strong>
                        </div>
                      )}
                      {e.image&&<div style={{marginTop:6}}><img src={e.image} alt="첨부" style={{maxWidth:"100%",maxHeight:120,borderRadius:8,border:"1px solid #e8eaed",objectFit:"contain",cursor:"pointer",background:"#f8f9fb"}} onClick={ev=>{ev.stopPropagation();setImgPreview(e.image);}}/></div>}
                    </div>
                  </div>
                );
              })})()}
            </div>

            {/* Todo checklist */}
            {(()=>{
              const todos=crms.filter(c=>c.type==="todo");
              if(!todos.length)return null;
              const active=todos.filter(t=>!t.completed).sort((a,b)=>a.date.localeCompare(b.date));
              const done=todos.filter(t=>t.completed);
              const toggleTodo=(id)=>{
                if(!isEditor)return;
                const nc=crms.map(c=>c.id===id?{...c,completed:!c.completed}:c);
                setCrms(nc);save(tasks,devs,projs,nc,logs);
              };
              return(
                <div style={{padding:"20px 20px 0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <h2 style={{margin:0,fontSize:15,fontWeight:700,color:"#1a1a2e"}}>할일 <span style={{fontSize:12,fontWeight:400,color:"#9ca3af"}}>({active.length}건 남음)</span></h2>
                  </div>
                  {active.map(td=>{

                return Object.values(grouped).map((g,i)=>{
                  const x=dateCX(g.date);const isPrd=g.env==="PRD";
                  return(<div key={`dp${i}`} style={{position:"absolute",left:x-8,top:0,width:16,height:20,cursor:"pointer",zIndex:3,display:"flex",alignItems:"center",justifyContent:"center"}}
                    onClick={e=>{e.stopPropagation();setDeployTip(dt=>dt===g?null:g);setDeployTipPos({x:e.clientX,y:e.clientY});}}>
                    <div style={{width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderBottom:`9px solid ${isPrd?"#22c55e":"#f59e0b"}`,opacity:g.status==="deployed"?1:.6}}/>
                    {g.items.length>1&&<span style={{position:"absolute",top:0,right:0,fontSize:8,fontWeight:800,color:isPrd?"#22c55e":"#f59e0b",lineHeight:1}}>{g.items.length}</span>}
                  </div>);
                });
              })()}
              {crms.filter(c=>c.type!=="todo").map((c,i)=>{const x=dateCX(c.date);const isEtc=c.type==="etc";return(<div key={`crm${i}`} style={{position:"absolute",left:x-8,top:2,width:16,height:16,cursor:"pointer",zIndex:3,display:"flex",alignItems:"center",justifyContent:"center",opacity:c.completed?.35:1}}
                onClick={()=>{if(isEditor){setEditCrm(c);setModal("crm");}else{setPwModal(true);}}}>
                <div style={{width:8,height:8,borderRadius:isEtc?2:"50%",background:isEtc?"#6b7280":"#c084fc",opacity:.75}}/>
                {c.image&&<span style={{position:"absolute",top:-2,right:-2,fontSize:7,lineHeight:1}}>📎</span>}
              </div>);})}
              <div style={{position:"absolute",left:todayX,top:0,width:2,height:20,background:"#6366f1",zIndex:4}}/>
            </div>

            {/* rows */}
            {groups.map(g=>(
              <div key={g.key}>
                <div style={{height:30,borderBottom:"1px solid #e8eaed",position:"relative",background:"rgba(99,102,241,.03)"}}>
                  <div style={{position:"absolute",left:todayX,top:0,width:2,height:30,background:"rgba(99,102,241,.1)"}}/>
                </div>
                {/* heatmap row in dev view */}
                {view==="developer"&&g.devId&&(()=>{
                  const loadMap=manualLoad[g.devId]||{};
                  return(
                    <div style={{height:HEATMAP_H,borderBottom:"1px solid #e8eaed",position:"relative",display:"flex"}}>
                      {dayLayout.map((d,i)=>{
                        const level=loadMap[d.date]||0;
                        const bg=d.isWe?"#f5f5f7":LOAD_COLORS[level];
                        return <div key={i} style={{width:d.w,height:HEATMAP_H,background:bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:d.isWe?"default":"pointer",transition:"background .15s"}}
                          onClick={()=>{if(!d.isWe)cycleLoad(g.devId,d.date);}}>
                          {level>0&&!d.isWe&&<span style={{fontSize:8,fontWeight:700,color:LOAD_TEXT_COLORS[level],lineHeight:1}}>{LOAD_LABELS[level]}</span>}
                        </div>;
                      })}
                      <div style={{position:"absolute",left:todayX,top:0,width:2,height:HEATMAP_H,background:"rgba(99,102,241,.1)",pointerEvents:"none"}}/>
                    </div>
                  );
                })()}
                {g.items.map(task=>{
                  const rh=getRowH(task);const showSubs=task._showSubs||task.subtasks;
                  return(
                    <div key={task.id+g.key} style={{height:rh,borderBottom:"1px solid #e8eaed",position:"relative"}}
                      onMouseMove={e=>{if(e.pointerType==="touch"||"ontouchstart"in window)return;setHover(task);setHPos({x:e.clientX,y:e.clientY});}} onMouseLeave={()=>setHover(null)}>
                      {dayLayout.map((d,i)=>d.isWe?<div key={i} style={{position:"absolute",left:d.x,top:0,width:d.w,height:rh,background:"#f5f5f7"}}/>:null)}
                      <div style={{position:"absolute",left:todayX,top:0,width:2,height:rh,background:"rgba(99,102,241,.1)",zIndex:1}}/>
                      {/* task deploy lines */}
                      {(task.deploys||[]).map((d,di)=>{
                        const idx=diffD(rStart,d.date);const dl=dayLayout[Math.min(idx,dayLayout.length-1)];
                        const dx=dl?dl.x+dl.w:0;const isPrd=d.env==="PRD";
                        return <div key={`tdp${di}`} style={{position:"absolute",left:dx-1,top:0,width:2,height:rh,background:isPrd?"rgba(34,197,94,.2)":"rgba(245,158,11,.2)",zIndex:1,borderTop:`3px solid ${isPrd?"#22c55e":"#f59e0b"}`}}/>;
                      })}
                      {showSubs.map((s,si)=>{const color=ROLE_C[s.role]||"#6366f1";const w=barW(s.start,s.end);
                        return(<div key={s.id} style={{position:"absolute",left:barL(s.start),top:6+si*22,width:w,height:18,borderRadius:5,background:color,opacity:s.done?.35:.9,cursor:"pointer",zIndex:2,display:"flex",alignItems:"center",paddingLeft:6,overflow:"hidden"}}
                          onClick={()=>{if(isEditor){setEditTask(task);setModal("task");}else{setPwModal(true);}}}>
                          <span style={{fontSize:10,fontWeight:700,color:"#fff",whiteSpace:"nowrap"}}>{s.role}</span>
                          <span style={{fontSize:10,color:"rgba(255,255,255,.7)",marginLeft:4,whiteSpace:"nowrap",overflow:"hidden"}}>{devs.find(x=>x.id===s.dev_id)?.name||""}</span>
                        </div>);
                      })}
                      {task.hasQa&&task.qa_start&&<div style={{position:"absolute",left:barL(task.qa_start),top:6+showSubs.length*22,width:barW(task.qa_start,task.qa_end),height:18,borderRadius:5,background:"#f59e0b",opacity:task.qaDone?.35:.9,zIndex:2,cursor:"pointer",display:"flex",alignItems:"center",paddingLeft:6,overflow:"hidden"}}
                        onClick={()=>{if(isEditor){setEditTask(task);setModal("task");}else{setPwModal(true);}}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#fff",whiteSpace:"nowrap"}}>QA</span>
                        <span style={{fontSize:10,color:"rgba(255,255,255,.7)",marginLeft:4,whiteSpace:"nowrap",overflow:"hidden"}}>{devs.find(x=>x.id===task.qa_dev_id)?.name||""}</span>
                      </div>}
                    </div>
                  );
                })}
                {(g.todos||[]).map(td=>{
                  const idx=diffD(rStart,td.date);const dl=dayLayout[Math.min(Math.max(idx,0),dayLayout.length-1)];
                  const tdLeft=dl?dl.x:0;const tdW=dl?dl.w:DW;
                  return(
                    <div key={td.id} style={{height:28,borderBottom:"1px solid #e8eaed",position:"relative"}}>
                      {dayLayout.map((d,i)=>d.isWe?<div key={i} style={{position:"absolute",left:d.x,top:0,width:d.w,height:28,background:"#f5f5f7"}}/>:null)}
                      <div style={{position:"absolute",left:todayX,top:0,width:2,height:28,background:"rgba(99,102,241,.1)",zIndex:1}}/>
                      <div style={{position:"absolute",left:tdLeft+1,top:5,width:Math.max(tdW-2,14),height:18,borderRadius:9,background:td.completed?"rgba(34,197,94,.15)":"rgba(245,158,11,.15)",border:`1px solid ${td.completed?"rgba(34,197,94,.3)":"rgba(245,158,11,.3)"}`,cursor:"pointer",zIndex:2,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",opacity:td.completed?.45:1}}
                        onClick={()=>{if(isEditor){setEditCrm(td);setModal("crm");}else{setPwModal(true);}}}>
                        {tdW>=30&&<span style={{fontSize:9,fontWeight:600,color:td.completed?"#16a34a":"#d97706",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",padding:"0 2px"}}>{td.name}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* tooltip */}
      {hover&&<div style={{position:"fixed",left:Math.min(hPos.x+14,window.innerWidth-280),top:Math.min(hPos.y-10,window.innerHeight-280),background:"#ffffff",border:"1px solid #e2e5ea",borderRadius:14,padding:16,zIndex:1001,minWidth:220,maxWidth:280,boxShadow:"0 12px 48px rgba(0,0,0,.2)",pointerEvents:"none"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:8,lineHeight:1.3}}>{hover.title}</div>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:700,background:"rgba(100,116,139,.12)",color:STATUS_C[hover.status]}}>{STATUS_L[hover.status]}</span>
        </div>
        {hover.subtasks.map(s=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,fontSize:12}}>
            <span style={{width:8,height:8,borderRadius:2,background:ROLE_C[s.role],flexShrink:0}}/><span style={{color:"#6b7280",minWidth:18}}>{s.role}</span>
            <span style={{color:"#1a1a2e"}}>{devs.find(d=>d.id===s.dev_id)?.name||"미배정"}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#9ca3af",fontSize:11,marginLeft:"auto"}}>{fmtD(s.start)}→{fmtD(s.end)}</span>
          </div>
        ))}
        {hover.hasQa&&hover.qa_start&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:2,fontSize:12}}>
          <span style={{width:8,height:4,borderRadius:2,background:"#f59e0b",opacity:.4,flexShrink:0}}/><span style={{color:"#6b7280"}}>QA</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#9ca3af",fontSize:11,marginLeft:"auto"}}>{fmtD(hover.qa_start)}→{fmtD(hover.qa_end)}</span>
        </div>}
        {(hover.deploys||[]).length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e2e5ea"}}>
          {hover.deploys.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,marginBottom:3}}>
            <span style={{padding:"1px 6px",borderRadius:4,fontWeight:800,fontSize:9,background:d.env==="PRD"?"rgba(34,197,94,.1)":"rgba(245,158,11,.1)",color:d.env==="PRD"?"#22c55e":"#f59e0b"}}>{d.env}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#9ca3af"}}>{fmtD(d.date)}</span>
            <span style={{color:d.status==="deployed"?"#22c55e":"#6b7280"}}>{{scheduled:"예정",deployed:"완료",rollback:"롤백"}[d.status]}</span>
          </div>))}
        </div>}
      </div>}

      {/* deploy marker tooltip */}
      {deployTip&&<div style={{position:"fixed",left:Math.min(deployTipPos.x+12,window.innerWidth-260),top:deployTipPos.y+16,background:"#ffffff",border:"1px solid #e2e5ea",borderRadius:12,padding:14,zIndex:1002,minWidth:200,maxWidth:280,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}}
        onClick={()=>setDeployTip(null)}>
        <div style={{fontSize:10,color:"#9ca3af",marginBottom:6}}>{fmtD(deployTip.date)} · {deployTip.env} 배포{deployTip.items?.length>1?` (${deployTip.items.length}건)`:""}</div>
        {(deployTip.items||[deployTip]).map((d,i)=>(
          <div key={i} style={{marginBottom:i<(deployTip.items||[]).length-1?8:0}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1a1a2e",marginBottom:2}}>{d.source}</div>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
              <span style={{padding:"1px 6px",borderRadius:4,fontWeight:800,fontSize:9,background:d.env==="PRD"?"rgba(34,197,94,.12)":"rgba(245,158,11,.12)",color:d.env==="PRD"?"#22c55e":"#f59e0b"}}>{d.env}</span>
              <span style={{color:d.status==="deployed"?"#22c55e":"#6b7280"}}>{{scheduled:"예정",deployed:"완료",rollback:"롤백"}[d.status]}</span>
              <span style={{fontSize:10,color:"#9ca3af"}}>{d.level==="project"?"프로젝트":"태스크"}</span>
            </div>
            {d.note&&<div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{d.note}</div>}
          </div>
        ))}
        <div style={{fontSize:9,color:"#e2e5ea",marginTop:6,textAlign:"center"}}>탭하여 닫기</div>
      </div>}

      </>}

      <Modal open={modal==="task"} onClose={()=>{setModal(null);setEditTask(null);}} title={editTask?"태스크 수정":"새 태스크"}>
        <TaskForm task={editTask} projects={projs} developers={devs} onSave={handleSaveTask} onCancel={()=>{setModal(null);setEditTask(null);}} onDelete={handleDelTask}/>
      </Modal>
      <Modal open={modal==="project"} onClose={()=>{setModal(null);setEditProj(null);}} title={editProj?"프로젝트 수정":"새 프로젝트"}>
        <ProjectForm project={editProj} onSave={handleSaveProj} onCancel={()=>{setModal(null);setEditProj(null);}} onDelete={handleDelProj} taskCount={editProj?tasks.filter(t=>t.project_id===editProj.id).length:0} developers={devs}/>
      </Modal>
      <Modal open={modal==="crm"} onClose={()=>{setModal(null);setEditCrm(null);}} title={editCrm?(editCrm.type==="todo"?"할일 수정":editCrm.type==="etc"?"기타 일정 수정":"CRM 일정 수정"):"새 일정 등록"}>
        <CrmForm crm={editCrm} onSave={handleSaveCrm} onCancel={()=>{setModal(null);setEditCrm(null);}} onDelete={handleDelCrm} developers={devs}/>
      </Modal>
      <Modal open={modal==="devmgr"} onClose={()=>{setModal(null);setEditDev(null);}} title="인원 관리">
        {!editDev?(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {devs.map(d=>(
              <div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,border:"1px solid #e8eaed",cursor:"pointer"}}
                onClick={()=>setEditDev(d)}>
                <span style={{fontSize:14,fontWeight:600,flex:1}}>{d.name}</span>
                <span style={{fontSize:12,color:"#6b7280"}}>{d.role}</span>
              </div>
            ))}
            <button onClick={()=>setEditDev({id:uid(),name:"",role:"Backend",max:3})}
              style={{padding:"10px",borderRadius:10,border:"1px dashed #e2e5ea",background:"none",color:"#6366f1",cursor:"pointer",fontSize:13,fontWeight:600}}>+ 인원 추가</button>
          </div>
        ):<DevForm dev={editDev} isNew={!devs.some(d=>d.id===editDev.id)} onSave={d=>{handleSaveDev(d);setEditDev(null);}} onBack={()=>setEditDev(null)} onDelete={id=>{handleDelDev(id);setEditDev(null);}}/>}
      </Modal>
      <Modal open={modal==="copytext"} onClose={()=>setModal(null)} title="텍스트 복사">
        <p style={{fontSize:12,color:"#6b7280",margin:"0 0 8px"}}>아래 텍스트를 선택해서 복사하세요</p>
        <textarea readOnly value={copyTextContent} style={{width:"100%",minHeight:200,padding:12,border:"1px solid #e2e5ea",borderRadius:10,fontSize:12,fontFamily:"'JetBrains Mono',monospace",background:"#f8f9fb",color:"#1a1a2e",resize:"vertical",boxSizing:"border-box",lineHeight:1.6}}
          onFocus={e=>e.target.select()}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
          <button onClick={()=>setModal(null)} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>닫기</button>
        </div>
      </Modal>
      <Modal open={modal==="backup"} onClose={()=>setModal(null)} title="데이터 백업">
        <p style={{fontSize:12,color:"#6b7280",margin:"0 0 8px"}}>아래 전체 내용을 복사해서 메모장이나 구글 드라이브 문서에 붙여넣기 하세요</p>
        <textarea readOnly value={copyTextContent} style={{width:"100%",minHeight:250,padding:12,border:"1px solid #e2e5ea",borderRadius:10,fontSize:11,fontFamily:"'JetBrains Mono',monospace",background:"#f8f9fb",color:"#1a1a2e",resize:"vertical",boxSizing:"border-box",lineHeight:1.4}}
          onFocus={e=>e.target.select()}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
          <span style={{fontSize:11,color:"#9ca3af"}}>프로젝트 {projs.length}개 · 태스크 {tasks.length}개 · 일정 {crms.filter(c=>c.type!=="todo").length}개 · 할일 {crms.filter(c=>c.type==="todo").length}개 · 인원 {devs.length}명</span>
          <button onClick={()=>setModal(null)} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>닫기</button>
        </div>
      </Modal>
      <Modal open={modal==="restore-paste"} onClose={()=>setModal(null)} title="데이터 복원 (붙여넣기)">
        <p style={{fontSize:12,color:"#6b7280",margin:"0 0 8px"}}>백업해둔 JSON 텍스트를 아래에 붙여넣기 하세요</p>
        <textarea id="restore-textarea" style={{width:"100%",minHeight:200,padding:12,border:"1px solid #e2e5ea",borderRadius:10,fontSize:11,fontFamily:"'JetBrains Mono',monospace",background:"#f8f9fb",color:"#1a1a2e",resize:"vertical",boxSizing:"border-box",lineHeight:1.4}}
          placeholder='{"tasks":[...],"devs":[...],...}'/>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10}}>
          <button onClick={()=>setModal(null)} style={{padding:"8px 20px",borderRadius:8,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>취소</button>
          <button onClick={()=>{
            const txt=document.getElementById("restore-textarea")?.value;
            if(!txt){alert("데이터를 붙여넣기 해주세요");return;}
            try{
              const d=JSON.parse(txt);
              if(d.tasks)setTasks(d.tasks);if(d.devs)setDevs(d.devs);if(d.projs)setProjs(d.projs);if(d.crms)setCrms(d.crms);if(d.logs)setLogs(d.logs);if(d.workload){setManualLoad(d.workload);saveLoad(d.workload);}
              save(d.tasks||tasks,d.devs||devs,d.projs||projs,d.crms||crms,d.logs||logs);
              setModal(null);
            }catch(err){alert("올바른 JSON 형식이 아닙니다. 백업 데이터를 확인해주세요.");}
          }} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>복원하기</button>
        </div>
      </Modal>
      <Modal open={modal==="copied"} onClose={()=>setModal(null)} title="복사 완료">
        <p style={{fontSize:14,color:"#1a1a2e",margin:"0 0 16px"}}>클립보드에 복사되었습니다. Slack이나 카톡에 붙여넣기 하세요.</p>
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setModal(null)} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>확인</button>
        </div>
      </Modal>
      {/* Password modal for editor access */}
      <Modal open={pwModal} onClose={()=>{setPwModal(false);setPwInput("");setPwError(false);}} title="편집 모드 잠금해제">
        <p style={{fontSize:13,color:"#6b7280",margin:"0 0 12px"}}>편집 비밀번호를 입력하세요</p>
        <input
          type="password"
          value={pwInput}
          onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
          onKeyDown={e=>{if(e.key==="Enter"){if(pwInput==="0323"){setIsEditor(true);setPwModal(false);setPwInput("");setPwError(false);}else{setPwError(true);}}}}
          placeholder="비밀번호"
          style={{width:"100%",padding:"10px 14px",border:`2px solid ${pwError?"#ef4444":"#e2e5ea"}`,borderRadius:10,fontSize:14,background:"#f8f9fb",color:"#1a1a2e",boxSizing:"border-box",textAlign:"center",letterSpacing:2,outline:"none"}}
          autoFocus
        />
        {pwError&&<p style={{fontSize:12,color:"#ef4444",margin:"8px 0 0"}}>비밀번호가 올바르지 않습니다</p>}
        <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={()=>{setPwModal(false);setPwInput("");setPwError(false);}} style={{padding:"8px 20px",borderRadius:8,border:"1px solid #e2e5ea",background:"none",color:"#6b7280",cursor:"pointer",fontSize:13}}>취소</button>
          <button onClick={()=>{if(pwInput==="0323"){setIsEditor(true);setPwModal(false);setPwInput("");setPwError(false);}else{setPwError(true);}}} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>확인</button>
        </div>
      </Modal>
      {imgPreview&&<div onClick={()=>setImgPreview(null)} style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)"}}/>
        <img src={imgPreview} alt="미리보기" style={{position:"relative",maxWidth:"92vw",maxHeight:"88vh",borderRadius:12,objectFit:"contain",boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}/>
        <button onClick={()=>setImgPreview(null)} style={{position:"absolute",top:16,right:16,width:36,height:36,borderRadius:18,border:"none",background:"rgba(255,255,255,.2)",color:"#fff",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>✕</button>
      </div>}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
